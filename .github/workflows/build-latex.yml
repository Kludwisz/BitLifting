name: latex2pdf

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-latex:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6

      - name: Compile latex to pdf
        id: compile-latex-document
        uses: thomas-chauvet/latex2pdf-action@2.0.1
        with:
          output_dir: output
          main_latex_file: main.tex
          ctan_packages: amsmath algorithmicx listings

      - name: Upload pdf to the workflow tab
        uses: actions/upload-artifact@v4
        with:
          name: output-main
          path: output/bitlifting.pdf

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v3
        with:
          files: output/bitlifting.pdf
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false